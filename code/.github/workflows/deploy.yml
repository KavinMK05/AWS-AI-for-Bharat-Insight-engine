name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Lambdas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambda functions
        env:
          ENVIRONMENT: dev
          S3_BUCKET: insight-engine-dev-lambda-deployments
        run: |
          PACKAGES=("watchtower" "analyst" "ghostwriter" "gatekeeper" "publisher")

          for PKG in "${PACKAGES[@]}"; do
            echo "Deploying ${PKG}..."

            # Create zip from built output
            cd packages/${PKG}
            zip -r "../../dist/${PKG}.zip" dist/ package.json
            cd ../..

            # Upload to S3
            aws s3 cp "dist/${PKG}.zip" "s3://${S3_BUCKET}/${PKG}.zip"

            # Update Lambda function code
            aws lambda update-function-code \
              --function-name "insight-engine-${ENVIRONMENT}-${PKG}" \
              --s3-bucket "${S3_BUCKET}" \
              --s3-key "${PKG}.zip"

            echo "${PKG} deployed successfully."
          done
