name: Deploy

on:
  push:
    branches: [main]
    # 1. Only trigger when files inside the 'code' folder change
    

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Lambdas
    runs-on: ubuntu-latest

    # 2. Automatically run all scripts inside the 'code' directory
    defaults:
      run:
        working-directory: ./code

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          # 3. Point the cache exactly to where your lockfile lives
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

# Your deployment script stays exactly the same! 
      # Because of the 'defaults' setting above, it acts exactly as if it were in the code folder.
      - name: Deploy Lambda functions
        env:
          ENVIRONMENT: dev
          S3_BUCKET: insight-engine-dev-lambda-deployments
        run: |
          # Create dist directory if it doesn't exist
          mkdir -p dist
          
          PACKAGES=("watchtower" "analyst" "ghostwriter" "gatekeeper" "publisher")

          for PKG in "${PACKAGES[@]}"; do
            echo "Deploying ${PKG}..."

            # Create a temporary deployment directory
            cd packages/${PKG}
            rm -rf deploy
            mkdir -p deploy
            
            # Copy the built output
            cp -r dist/* deploy/
            
            # Copy package.json
            cp package.json deploy/
            
            # Copy pnpm-lock.yaml from root
            cp ../../pnpm-lock.yaml deploy/
            
            # Install all dependencies including peer dependencies in the deploy directory
            cd deploy
            pnpm install --prod --frozen-lockfile
            rm pnpm-lock.yaml
            cd ..
            
            # Create the zip with files at the root (not in a subdirectory)
            cd deploy
            zip -r "../../../dist/${PKG}.zip" .
            cd ../..

            # Upload to S3
            aws s3 cp "dist/${PKG}.zip" "s3://${S3_BUCKET}/${PKG}.zip"

            # Update Lambda function code
            aws lambda update-function-code \
              --function-name "insight-engine-${ENVIRONMENT}-${PKG}" \
              --s3-bucket "${S3_BUCKET}" \
              --s3-key "${PKG}.zip"

            echo "${PKG} deployed successfully."
          done